<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechZone Electro | Boutique Tech Premium au Maroc</title>
  <meta name="description"
    content="TechZone Electro, boutique marocaine d'electronique premium: smartphones, laptops, tablettes, audio, livraison rapide et garantie." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#020617" />
  <link rel="canonical" href="https://techzone-api.gt.tc/" />
  <meta property="og:title" content="TechZone Electro | Excellence Technologique" />
  <meta property="og:description"
    content="Decouvrez une selection premium de smartphones, laptops, tablettes et audio au Maroc." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://techzone-api.gt.tc/" />
  <meta property="og:image" content="https://techzone-api.gt.tc/s24-ultra-hero.jpg" />

  <!-- === PERFORMANCE: Resource hints === -->
  <link rel="preconnect" href="https://techzone-api.gt.tc" />
  <link rel="dns-prefetch" href="https://techzone-api.gt.tc" />

  <!-- === LCP IMAGE: Preload hero image with high priority === -->
  <link
    rel="preload"
    as="image"
    href="/s24-ultra-cutout-dark-180.jpg"
    imagesrcset="/s24-ultra-cutout-dark-180.jpg 180w, /s24-ultra-cutout-dark.jpg 221w"
    imagesizes="(max-width: 640px) 180px, 221px"
    fetchpriority="high"
  />

  <!-- === CRITICAL CSS: Minimal inline styles for instant first paint === -->
  <!-- Full styles are in index.css (loaded by Vite); this prevents FOUC -->
  <style>
    /* 1. Prevent layout shift before Tailwind loads */
    *,::before,::after{box-sizing:border-box;}
    html{height:auto;}
    body{
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:15px;line-height:1.6;
      background-color:#ffffff;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      margin:0;
    }
    /* 2. Prevent dark-mode flash */
    @media(prefers-color-scheme:dark){
      html:not(.light) body{background-color:#020617;color:#f1f5f9;}
    }
    /* 3. Lenis smooth scroll compatibility */
    .lenis.lenis-smooth{scroll-behavior:auto;}
    .lenis.lenis-smooth [data-lenis-prevent]{overscroll-behavior:contain;}
    .lenis.lenis-stopped{overflow:hidden;}
    /* 4. Reserve space for hero image to reduce CLS */
    #root{min-height:100vh;}
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root">
    <div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background-color:#020617;">
      <style>
        .tz-spinner {
          width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
          border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="tz-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/index.jsx"></script>
</body>

</html>
